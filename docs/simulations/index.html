<body>

  <!-- Nav -->
  <nav class="site-nav">
    <a class="nav-home" href="/">Greg McDonnell</a>
    <ul class="nav-links">
      <li><a href="/projects">Projects</a></li>
      <li><a href="/simulations" class="active">Simulations</a></li>
      <li><a href="/gallery">Gallery</a></li>
      <li><a href="/notes">Notes</a></li>
    </ul>
  </nav>

  <!-- Page header -->
  <div class="page-header">
    <p class="page-label">Catalogue</p>
    <h1>Simulations</h1>
    <p>All interactive simulations found on this site.</p>
  </div>

  <!-- Filter + list -->
  <main>
    <div class="filter-nav" id="filter-nav">
      <button class="filter-btn active" data-filter="all">All</button>
    </div>
    <div id="sim-list">
      <p class="loading-msg">Loading…</p>
    </div>
  </main>

  <!-- Footer -->

    <footer class="site-footer">
        <span>© 2026 Gregory McDonnell</span>
        <div class="footer-links">
            <a href="https://github.com/gregmcdonnell/gregmcdonnell.github.io.git" target="_blank">GitHub</a>
            <a href="www.linkedin.com/in/greg-mcdonnell-a62398174" target="_blank">LinkedIn</a>
        </div>
    </footer>

  <script>
    let allSims = [];
    let allProjects = [];

    async function init() {
      const list = document.getElementById('sim-list');
      try {
        const [simRes, projRes] = await Promise.all([
          fetch('/simulations/simulations.json'),
          fetch('/projects/manifest.json')
        ]);
        allSims = await simRes.json();
        allProjects = await projRes.json();

        // Build tag buttons from sim tags
        const tags = [...new Set(allSims.flatMap(s => s.tags || []))].sort();
        const filterNav = document.getElementById('filter-nav');
        tags.forEach(tag => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.dataset.filter = tag;
          btn.textContent = tag;
          btn.addEventListener('click', () => setFilter(tag, btn));
          filterNav.appendChild(btn);
        });

        document.querySelector('[data-filter="all"]').addEventListener('click', function() {
          setFilter('all', this);
        });

        renderSims(allSims);
      } catch (e) {
        list.innerHTML = '<p class="error-msg">Could not load simulations data.</p>';
      }
    }

    function setFilter(filter, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = filter === 'all'
        ? allSims
        : allSims.filter(s => (s.tags || []).includes(filter));
      renderSims(filtered);
    }

    function renderSims(sims) {
      const list = document.getElementById('sim-list');
      if (!sims.length) {
        list.innerHTML = '<p class="loading-msg">No simulations match this filter.</p>';
        return;
      }

      list.innerHTML = sims.map((s, i) => {
        const project = allProjects.find(p => p.slug === s.slug);
        // <div class="sim-card stagger-${Math.min(i + 1, 6)}">
        //     <div>
        //       <div class="sim-meta">
        //         <span class="sim-date">${s.date}</span>
        //         <span class="sim-software">${s.software}</span>
        //       </div>
        //       <div class="sim-title">${s.title}</div>
        //       <div class="sim-desc">${s.description}</div>
        //       <div class="sim-tags">
        //         ${(s.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
        //       </div>
        //       ${project ? `<a class="sim-project-link" href="${project.url}">↗ ${project.title}</a>` : ''}
        //     </div>
        //   </div>

            // 
        return `
          <a class="project-card project-card-i stagger-${Math.min(i + 1, 6)}" href="${s.url}">
            <img class="project-card__thumb" src="${s.url}/thumbnail.png" alt="${s.title} preview" loading="lazy">
            <div class="project-card__content">
              <div class="project-meta">
                <span class="project-date">${s.date}</span>
                ${(s.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
              <div class="project-title">${s.title}</div>
              <div class="project-desc">${s.description}</div>
            </div>
            <span class="arrow">Run →</span>
          </a>
        `;
      }).join('');
    }

    init();
  </script>

</body>
</html>
